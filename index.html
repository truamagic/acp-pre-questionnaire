<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ACP事前問診｜あこプラ</title>

<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'none'">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta name="referrer" content="no-referrer">
<meta name="robots" content="noindex, nofollow">

<style>
/* ACP事前問診 — スタイル定義
   方針：外部フォント・外部CDNは一切使用しない。システムフォントのみ。
   高齢の患者・ご家族にも読みやすいよう、文字を大きめに、余白を広めに取る。 */

:root {
  --bg: #F5F6F1;
  --bg-elevated: #FFFFFF;
  --ink: #2B322D;
  --ink-muted: #5C6359;
  --ink-faint: #505850;
  --forest: #3E5C4E;
  --forest-deep: #2E453A;
  --forest-tint: #E4EAE4;
  --gold: #A97F3D;
  --gold-ink: #8A5F24;
  --gold-tint: #F4EBDA;
  --line: #B8C0B8;
  --line-strong: #737C74;
  --caution-ink: #6B4A2A;
  --caution-bg: #F6EEE0;
  --caution-line: #E3D2AE;
  --focus: #235142;
  --radius-lg: 22px;
  --radius-md: 14px;
  --radius-sm: 10px;
  --shadow-soft: 0 2px 14px rgba(43, 50, 45, 0.07);
  --font-display: "Hiragino Mincho ProN", "Yu Mincho", YuMincho, "Noto Serif JP", serif;
  --font-body: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic Medium", "Yu Gothic", Meiryo, sans-serif;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: 18px;
  line-height: 1.75;
  -webkit-text-size-adjust: 100%;
}
body { min-height: 100vh; overflow-x: hidden; }

#app {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  max-width: 680px;
  margin: 0 auto;
  position: relative;
}

/* ---------- 背景の木漏れ日モチーフ（開始画面・完了画面のみ／控えめ） ---------- */
.komorebi-bg {
  position: absolute;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
  z-index: 0;
}
.komorebi-bg span {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(184,147,90,0.16) 0%, rgba(184,147,90,0) 70%);
  filter: blur(2px);
}
.komorebi-bg span:nth-child(1) { width: 220px; height: 220px; top: -60px; left: -40px; }
.komorebi-bg span:nth-child(2) { width: 160px; height: 160px; top: 40px; right: -50px;
  background: radial-gradient(circle, rgba(62,92,78,0.14) 0%, rgba(62,92,78,0) 70%); }
.komorebi-bg span:nth-child(3) { width: 130px; height: 130px; bottom: 60px; left: 20%;
  background: radial-gradient(circle, rgba(184,147,90,0.12) 0%, rgba(184,147,90,0) 70%); }

/* ---------- ヘッダー ---------- */
.topbar {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 20px 10px;
}
.topbar .brand {
  font-family: var(--font-display);
  font-size: 15px;
  letter-spacing: 0.03em;
  color: var(--ink-muted);
}
.brand-logo-topbar {
  height: 30px;
  width: auto;
  display: block;
}
.brand-logo-hero {
  width: min(46vw, 172px);
  height: auto;
  display: block;
  margin: 0 auto 14px;
}
.progress {
  font-size: 13px;
  color: var(--ink-muted);
  font-variant-numeric: tabular-nums;
  background: var(--forest-tint);
  padding: 4px 12px;
  border-radius: 999px;
}
.progress-track {
  position: relative;
  z-index: 1;
  height: 4px;
  background: var(--line);
  margin: 0 20px 6px;
  border-radius: 999px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--forest);
  border-radius: 999px;
  transition: width 0.35s ease;
}
@media (prefers-reduced-motion: reduce) {
  .progress-fill { transition: none; }
}

/* ---------- 本文エリア ---------- */
main.screen {
  position: relative;
  z-index: 1;
  flex: 1;
  padding: 14px 20px 28px;
  animation: fadeIn 0.28s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
@media (prefers-reduced-motion: reduce) {
  main.screen { animation: none; }
}

h1.q-title, h1.page-title {
  font-family: var(--font-display);
  font-size: 22px;
  line-height: 1.6;
  font-weight: 600;
  margin: 4px 0 6px;
  color: var(--ink);
}
/* 画面遷移時にJSからフォーカスされる見出し。マウス操作では枠線を出さず、
   キーボード／スクリーンリーダー利用時のみ視認できるようにする。 */
h1.q-title:focus, h1.start-title:focus {
  outline: none;
}
h1.q-title:focus-visible, h1.start-title:focus-visible {
  outline: 3px solid var(--focus);
  outline-offset: 4px;
}
p.q-sub, p.lead {
  color: var(--ink-muted);

  font-size: 16px;
  margin: 0 0 20px;
}
.note-inline {
  font-size: 16px;
  color: var(--ink-muted);
  background: var(--forest-tint);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  margin: -6px 0 18px;
}

/* ---------- 選択肢カード ---------- */
.option-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 8px;
}
.option-divider {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 6px 0 -2px;
  color: var(--ink-faint);
  font-size: 13px;
}
.option-divider::before, .option-divider::after {
  content: "";
  flex: 1;
  height: 1px;
  background: var(--line);
}

.option {
  position: relative;
  display: flex;
  align-items: center;
  gap: 14px;
  background: var(--bg-elevated);
  border: 1.5px solid var(--line);
  border-radius: var(--radius-md);
  padding: 16px 16px;
  cursor: pointer;
  transition: border-color 0.15s ease, background-color 0.15s ease;
  min-height: 58px;
}
@media (prefers-reduced-motion: reduce) {
  .option { transition: none; }
}
.option:active { background: var(--forest-tint); }
.option input {
  position: absolute;
  opacity: 0;
  width: 1px; height: 1px;
}
.option .mark {
  flex: 0 0 auto;
  width: 26px;
  height: 26px;
  border-radius: 8px;
  border: 1.5px solid var(--line-strong);
  background: var(--bg-elevated);
  display: flex;
  align-items: center;
  justify-content: center;
  color: transparent;
  font-size: 16px;
}
.option.is-radio .mark { border-radius: 50%; }
.option .label {
  font-size: 17px;
  color: var(--ink);
  flex: 1;
}
.option.is-checked {
  border-color: var(--forest);
  background: var(--forest-tint);
}
.option.is-checked .mark {
  background: var(--forest);
  border-color: var(--forest);
  color: #fff;
}
.option.is-checked .label { font-weight: 600; }
.option.is-exclusive .mark { border-radius: var(--radius-sm); }
.option.is-exclusive.is-checked {
  border-color: var(--gold);
  background: var(--gold-tint);
}
.option.is-exclusive.is-checked .mark {
  background: var(--gold);
  border-color: var(--gold);
}
.option:focus-within {
  outline: 3px solid var(--focus);
  outline-offset: 2px;
}

/* ---------- ボタン ---------- */
.actionbar {
  position: sticky;
  bottom: 0;
  z-index: 2;
  background: linear-gradient(to top, var(--bg) 65%, rgba(245,246,241,0));
  padding: 18px 20px calc(18px + var(--safe-bottom));
  display: flex;
  gap: 10px;
}
.btn {
  appearance: none;
  border: none;
  border-radius: 999px;
  font-family: var(--font-body);
  font-size: 17px;
  font-weight: 600;
  padding: 15px 22px;
  cursor: pointer;
  min-height: 54px;
  text-align: center;
  transition: transform 0.12s ease, opacity 0.12s ease;
}
.btn:active { transform: scale(0.98); }
@media (prefers-reduced-motion: reduce) {
  .btn, .btn:active { transition: none; transform: none; }
}
.btn-primary {
  flex: 1;
  background: var(--forest);
  color: #fff;
}
.btn-primary:disabled {
  background: var(--line-strong);
  color: var(--ink-faint);
  cursor: not-allowed;
}
.btn-secondary {
  background: transparent;
  color: var(--ink-muted);
  border: 1.5px solid var(--line-strong);
}
.btn-text {
  background: transparent;
  color: var(--forest);
  padding: 15px 10px;
}
.btn-block { width: 100%; }
.btn:focus-visible {
  outline: 3px solid var(--focus);
  outline-offset: 2px;
}

/* ---------- 開始画面 ---------- */
.start-wrap {
  display: flex;
  flex-direction: column;
  min-height: 78vh;
  justify-content: center;
}
.start-title {
  font-family: var(--font-display);
  font-size: 28px;
  line-height: 1.65;
  font-weight: 600;
  margin: 0 0 22px;
}
.start-body p {
  color: var(--ink);
  font-size: 16.5px;
  margin: 0 0 14px;
}
.start-reassure {
  margin-top: 22px;
  padding: 14px 16px;
  background: var(--forest-tint);
  border-radius: var(--radius-md);
  color: var(--forest-deep);
  font-size: 14px;
}

/* ---------- 確認画面 ---------- */
.summary-card {
  background: var(--bg-elevated);
  border: 1px solid var(--line);
  border-radius: var(--radius-md);
  padding: 18px 18px 6px;
  margin-bottom: 14px;
}
.summary-meta {
  display: flex;
  justify-content: space-between;
  font-size: 16px;
  color: var(--ink-muted);
  padding-bottom: 12px;
  margin-bottom: 12px;
  border-bottom: 1px dashed var(--line);
}
.summary-section { margin-bottom: 16px; }
.summary-section h3 {
  font-size: 14.5px;
  color: var(--forest-deep);
  margin: 0 0 6px;
  font-weight: 700;
}
.summary-section ul {
  margin: 0;
  padding-left: 0;
  list-style: none;
}
.summary-section li {
  font-size: 15.5px;
  padding: 3px 0 3px 18px;
  position: relative;
}
.summary-section li::before {
  content: "・";
  position: absolute;
  left: 0;
}
.summary-section .empty { color: var(--ink-faint); font-style: normal; }
.summary-note {
  font-size: 13.5px;
  color: var(--gold-ink);
  margin-top: -4px;
}
.attn-box {
  background: var(--forest-tint);
  border-radius: var(--radius-md);
  padding: 16px 18px;
  margin: 6px 0 16px;
}
.attn-box ul { margin: 6px 0 0; padding-left: 18px; }
.attn-box li { font-size: 14.5px; margin-bottom: 5px; color: var(--forest-deep); }

.inline-warning {
  display: flex;
  gap: 8px;
  align-items: flex-start;
  background: var(--caution-bg);
  border: 1px solid var(--caution-line);
  color: var(--caution-ink);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  font-size: 14.5px;
  margin-bottom: 14px;
}

/* ---------- QR画面 ---------- */
.qr-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding-top: 6px;
}
.qr-card {
  background: #fff;
  border-radius: var(--radius-lg);
  padding: 18px;
  box-shadow: var(--shadow-soft);
  width: min(84vw, 360px);
}
.qr-card svg { display: block; width: 100%; height: auto; }
.qr-timer {
  margin-top: 14px;
  font-size: 13.5px;
  color: var(--ink-muted);
  font-variant-numeric: tabular-nums;
}
.qr-guidance {
  margin-top: 6px;
  font-size: 16px;
  color: var(--ink-muted);
}
.qr-controls {
  display: flex;
  gap: 10px;
  margin-top: 16px;
  width: 100%;
}
.caution-box {
  width: 100%;
  margin-top: 22px;
  text-align: left;
  background: var(--caution-bg);
  border: 1px solid var(--caution-line);
  border-radius: var(--radius-md);
  padding: 16px 18px;
}
.caution-box h3 {
  margin: 0 0 8px;
  font-size: 14.5px;
  color: var(--caution-ink);
  display: flex;
  align-items: center;
  gap: 6px;
}
.caution-box ul { margin: 0; padding-left: 20px; }
.caution-box li { font-size: 14px; color: var(--caution-ink); margin-bottom: 6px; }

.disclosure { width: 100%; margin-top: 14px; }
.disclosure summary {
  cursor: pointer;
  font-size: 14px;
  color: var(--forest);
  list-style: none;
}
.disclosure summary::-webkit-details-marker { display: none; }
.disclosure summary::before { content: "▸ "; }
.disclosure[open] summary::before { content: "▾ "; }
.disclosure pre {
  white-space: pre-wrap;
  word-break: break-word;
  font-family: var(--font-body);
  font-size: 13.5px;
  background: var(--bg-elevated);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 12px;
  margin-top: 10px;
  text-align: left;
  color: var(--ink-muted);
}

.erased-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  min-height: 60vh;
  justify-content: center;
  gap: 14px;
}
.erased-wrap .icon-circle {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: var(--forest-tint);
  display: flex; align-items: center; justify-content: center;
  color: var(--forest);
  font-size: 26px;
}

.fs-toggle {
  position: absolute;
  top: 14px;
  right: 14px;
  z-index: 3;
  background: var(--bg-elevated);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 8px 14px;
  font-size: 13px;
  color: var(--ink-muted);
  cursor: pointer;
}

footer.foot-note {
  text-align: center;
  font-size: 12px;
  line-height: 1.7;
  color: var(--ink-faint);
  padding: 16px 20px 4px;
  margin-top: 18px;
  border-top: 1px solid var(--line);
}
footer.foot-note .foot-note-license {
  margin-top: 8px;
  font-size: 12px;
  opacity: 0.92;
}
footer.foot-note .foot-note-scope,
footer.foot-note .foot-note-trademark {
  margin-top: 4px;
  font-size: 12px;
}
.foot-license-details {
  margin-top: 10px;
  text-align: left;
}
.foot-license-details summary {
  display: inline-block;
  cursor: pointer;
  color: var(--forest-deep);
  font-size: 13px;
  font-weight: 600;
  text-decoration: underline;
  text-underline-offset: 3px;
}
.foot-license-details summary:focus-visible {
  outline: 3px solid var(--focus);
  outline-offset: 3px;
  border-radius: 4px;
}
.foot-license-details pre {
  margin: 10px 0 0;
  padding: 12px;
  max-height: 280px;
  overflow: auto;
  white-space: pre-wrap;
  overflow-wrap: anywhere;
  background: var(--bg-elevated);
  border: 1px solid var(--line-strong);
  border-radius: var(--radius-sm);
  color: var(--ink);
  font: 12px/1.55 ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
}

.visually-hidden {
  position: absolute;
  width: 1px; height: 1px;
  overflow: hidden;
  clip: rect(0 0 0 0);
  white-space: nowrap;
}

@media (min-width: 480px) {
  .start-title { font-size: 30px; }
}


/* ---------- UI/UX試作版：アクセシビリティ拡張 ---------- */
.skip-link {
  position: fixed;
  left: 12px;
  top: 8px;
  z-index: 100;
  transform: translateY(-160%);
  background: #fff;
  color: #111;
  border: 2px solid #111;
  border-radius: 8px;
  padding: 10px 14px;
  font-weight: 700;
}
.skip-link:focus { transform: translateY(0); }

.topbar {
  gap: 10px;
  flex-wrap: wrap;
}
.topbar-main {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  width: 100%;
}
.utility-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  width: 100%;
}
.utility-btn {
  appearance: none;
  border: 1.5px solid var(--line-strong);
  border-radius: 999px;
  background: var(--bg-elevated);
  color: var(--forest-deep);
  min-height: 44px;
  padding: 8px 13px;
  font: 600 14px/1.3 var(--font-body);
  cursor: pointer;
}
.utility-btn:focus-visible {
  outline: 3px solid var(--focus);
  outline-offset: 2px;
}
.progress {
  font-size: 14px;
  font-weight: 700;
}
.progress .remaining {
  display: block;
  font-size: 12px;
  font-weight: 500;
  text-align: center;
}
.progress-track[role="progressbar"] { min-height: 6px; }

.q-fieldset {
  border: 0;
  padding: 0;
  margin: 0;
  min-inline-size: 0;
}
.q-fieldset > legend {
  display: block;
  width: 100%;
  padding: 0;
}
legend.q-title {
  font-family: var(--font-display);
  font-size: 23px;
  line-height: 1.6;
  font-weight: 600;
  color: var(--ink);
  margin: 4px 0 8px;
}
legend.q-title:focus { outline: none; }
legend.q-title:focus-visible {
  outline: 3px solid var(--focus);
  outline-offset: 4px;
}

.option {
  border-width: 2px;
  min-height: 58px;
}
.option .mark {
  width: 30px;
  height: 30px;
  border-width: 2px;
  border-color: var(--line-strong);
  font-weight: 800;
}
.option.is-exclusive.is-checked {
  border-color: var(--forest);
  background: var(--forest-tint);
}
.option.is-exclusive.is-checked .mark {
  background: var(--forest);
  border-color: var(--forest);
}
.option-divider {
  margin-top: 12px;
  font-size: 14px;
  font-weight: 600;
}

.start-meta {
  display: grid;
  grid-template-columns: repeat(2, minmax(0,1fr));
  gap: 10px;
  margin: 4px 0 18px;
}
.start-meta-item {
  border: 1.5px solid var(--line-strong);
  border-radius: var(--radius-sm);
  background: var(--bg-elevated);
  padding: 11px 12px;
  text-align: center;
}
.start-meta-item strong { display: block; font-size: 18px; }
.start-meta-item span { display: block; font-size: 13.5px; color: var(--ink-muted); }
.start-points {
  list-style: none;
  padding: 0;
  margin: 14px 0 0;
}
.start-points li {
  position: relative;
  padding: 5px 0 5px 30px;
}
.start-points li::before {
  content: "✓";
  position: absolute;
  left: 3px;
  color: var(--forest);
  font-weight: 800;
}

.answer-count {
  background: var(--forest-tint);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  margin: 0 0 14px;
  color: var(--forest-deep);
  font-weight: 700;
}
.summary-section {
  border-bottom: 1px solid var(--line);
  padding-bottom: 14px;
}
.summary-section:last-child { border-bottom: 0; }
.summary-section-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}
.summary-edit {
  appearance: none;
  flex: 0 0 auto;
  border: 1.5px solid var(--line-strong);
  border-radius: 999px;
  background: var(--bg-elevated);
  color: var(--forest-deep);
  min-height: 44px;
  padding: 7px 12px;
  font: 600 14px/1.3 var(--font-body);
  cursor: pointer;
}
.summary-edit:focus-visible {
  outline: 3px solid var(--focus);
  outline-offset: 2px;
}
.summary-card .empty { color: var(--caution-ink); font-weight: 600; }

.utility-panel[hidden] { display: none; }
.utility-panel {
  position: fixed;
  inset: 0;
  z-index: 50;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding: 20px;
  background: rgba(17, 24, 20, 0.58);
}
.panel-card {
  width: min(100%, 620px);
  max-height: min(82vh, 720px);
  overflow-y: auto;
  background: var(--bg-elevated);
  border-radius: var(--radius-lg);
  box-shadow: 0 12px 40px rgba(0,0,0,.25);
  padding: 22px;
}
.panel-card h2 { margin: 0 0 8px; font-size: 22px; }
.panel-card ul { padding-left: 22px; }
.panel-card li { margin-bottom: 8px; }
.panel-close { margin-top: 16px; }
.setting-group {
  border: 0;
  padding: 0;
  margin: 18px 0;
}
.setting-group legend { font-weight: 700; margin-bottom: 8px; }
.setting-choice {
  display: flex;
  align-items: center;
  gap: 10px;
  min-height: 48px;
  padding: 8px 0;
}
.setting-choice input { width: 22px; height: 22px; }

  // =======================================================================
  // 2. 状態管理・画面描画・イベント処理（UI/UX試作版）
  // =======================================================================

  function freshState() {
    var answers = {};
    QUESTIONS.forEach(function (q) { answers[q.id] = new Set(); });
    return {
      screenIndex: 0,
      respondent: null,
      answers: answers,
      qrErased: false,
      editingQuestion: null,
      editingRespondent: false,
      qrExtensions: 0,
      timerWarned: false,
      display: {
        fontSize: 'standard',
        highContrast: false,
        reducedDecoration: false
      }
    };
  }

  var state = freshState();
  var qrRecordText = '';
  var eraseTimerId = null;
  var eraseTickId = null;
  var eraseDeadline = null;
  var lastPanelTrigger = null;

  var root = document.getElementById('app');

  // --- ユーティリティ ---

  function esc(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  function formatDateJa(d) {
    var y = d.getFullYear();
    var m = String(d.getMonth() + 1).padStart(2, '0');
    var day = String(d.getDate()).padStart(2, '0');
    return y + '年' + m + '月' + day + '日';
  }

  function questionById(id) {
    for (var i = 0; i < QUESTIONS.length; i++) {
      if (QUESTIONS[i].id === id) return QUESTIONS[i];
    }
    return null;
  }

  function orderedSelections(q) {
    var order = q.options.slice();
    if (q.exclusive) order.push(q.exclusive);
    return order.filter(function (opt) { return state.answers[q.id].has(opt.id); });
  }

  function anyAnswered() {
    return QUESTIONS.some(function (q) { return state.answers[q.id].size > 0; });
  }

  function answeredCount() {
    return QUESTIONS.filter(function (q) { return state.answers[q.id].size > 0; }).length;
  }

  function currentScreen() {
    return FLOW[state.screenIndex];
  }

  function goTo(screenName) {
    var idx = FLOW.indexOf(screenName);
    if (idx >= 0) {
      state.screenIndex = idx;
      render();
      window.scrollTo(0, 0);
    }
  }

  function goNext() {
    if (state.screenIndex < FLOW.length - 1) {
      state.screenIndex++;
      render();
      window.scrollTo(0, 0);
    }
  }

  function goBack() {
    if (state.screenIndex > 0) {
      state.screenIndex--;
      render();
      window.scrollTo(0, 0);
    }
  }

  function resetAll() {
    clearEraseTimer();
    qrRecordText = '';
    state = freshState();
    render();
    window.scrollTo(0, 0);
  }

  function applyDisplayPreferences() {
    root.classList.toggle('font-large', state.display.fontSize === 'large');
    root.classList.toggle('font-xlarge', state.display.fontSize === 'xlarge');
    root.classList.toggle('high-contrast', state.display.highContrast);
    root.classList.toggle('reduced-decoration', state.display.reducedDecoration);
  }

  // --- 経過記録用テキスト生成 ---

  function buildSectionBlock(q) {
    var lines = [q.section + '：'];
    var selected = orderedSelections(q);
    if (selected.length === 0) {
      lines.push('・未回答');
    } else {
      selected.forEach(function (opt) { lines.push('・' + opt.label); });
      if (q.noteTrigger && state.answers[q.id].has(q.noteTrigger)) {
        lines.push(q.noteText);
      }
    }
    return lines.join('\n');
  }

  function buildRecordText() {
    var today = formatDateJa(new Date());
    var tpl = CONTENT.recordTemplates[state.respondent] || CONTENT.recordTemplates._default;
    var blocks = [];
    var header = ['【ACP事前問診】', '回答日：' + today].concat(tpl.respondentLines);
    blocks.push(header.join('\n'));
    if (tpl.intro) blocks.push(tpl.intro);
    QUESTIONS.forEach(function (q) { blocks.push(buildSectionBlock(q)); });
    blocks.push(tpl.closing);
    return blocks.join('\n');
  }

  // --- 共通パーツ ---

  function utilityPanelsHtml() {
    var a11y = UI.accessibility;
    var helpItems = a11y.helpItems.map(function (item) { return '<li>' + esc(item) + '</li>'; }).join('');
    var font = state.display.fontSize;
    return (
      '<div class="utility-panel" data-panel="help" role="dialog" aria-modal="true" aria-labelledby="help-title" hidden>' +
        '<div class="panel-card">' +
          '<h2 id="help-title">' + esc(a11y.helpTitle) + '</h2>' +
          '<ul>' + helpItems + '</ul>' +
          '<button class="btn btn-primary btn-block panel-close" data-action="close-panel">' + esc(a11y.closeButton) + '</button>' +
        '</div>' +
      '</div>' +
      '<div class="utility-panel" data-panel="settings" role="dialog" aria-modal="true" aria-labelledby="settings-title" hidden>' +
        '<div class="panel-card">' +
          '<h2 id="settings-title">' + esc(a11y.settingsTitle) + '</h2>' +
          '<fieldset class="setting-group"><legend>文字の大きさ</legend>' +
            '<label class="setting-choice"><input type="radio" name="font-size" value="standard"' + (font === 'standard' ? ' checked' : '') + '>標準</label>' +
            '<label class="setting-choice"><input type="radio" name="font-size" value="large"' + (font === 'large' ? ' checked' : '') + '>大きい</label>' +
            '<label class="setting-choice"><input type="radio" name="font-size" value="xlarge"' + (font === 'xlarge' ? ' checked' : '') + '>特大</label>' +
          '</fieldset>' +
          '<fieldset class="setting-group"><legend>表示</legend>' +
            '<label class="setting-choice"><input type="checkbox" name="high-contrast"' + (state.display.highContrast ? ' checked' : '') + '>高コントラストにする</label>' +
            '<label class="setting-choice"><input type="checkbox" name="reduced-decoration"' + (state.display.reducedDecoration ? ' checked' : '') + '>装飾と動きを減らす</label>' +
          '</fieldset>' +
          '<p class="q-sub">表示設定も端末には保存されません。</p>' +
          '<button class="btn btn-primary btn-block panel-close" data-action="close-panel">' + esc(a11y.closeButton) + '</button>' +
        '</div>' +
      '</div>'
    );
  }

  function topbarHtml(questionNum, statusLabel) {
    var progressHtml = '';
    if (questionNum) {
      progressHtml = '<div class="progress" aria-label="質問 ' + questionNum + ' / ' + TOTAL_QUESTIONS + '">質問 ' + questionNum + ' / ' + TOTAL_QUESTIONS + '<span class="remaining">あと' + (TOTAL_QUESTIONS - questionNum) + '問</span></div>';
    } else if (statusLabel) {
      progressHtml = '<div class="progress">' + esc(statusLabel) + '</div>';
    }
    return (
      '<a class="skip-link" href="#main-content">本文へ移動</a>' +
      '<header class="topbar">' +
        '<div class="topbar-main">' +
          '<div class="brand"><img class="brand-logo-topbar" src="' + LOGO_DATA_URI + '" alt="' + esc(UI.brandName) + '"></div>' +
          progressHtml +
        '</div>' +
        '<div class="utility-actions" aria-label="表示と回答の支援">' +
          '<button type="button" class="utility-btn" data-action="open-settings">' + esc(UI.accessibility.displayButton) + '</button>' +
          '<button type="button" class="utility-btn" data-action="open-help">' + esc(UI.accessibility.helpButton) + '</button>' +
        '</div>' +
      '</header>' +
      utilityPanelsHtml()
    );
  }

  function progressTrackHtml(questionNum) {
    var pct = Math.round((questionNum / TOTAL_QUESTIONS) * 100);
    return '<div class="progress-track" role="progressbar" aria-label="質問の進み具合" aria-valuemin="1" aria-valuemax="' + TOTAL_QUESTIONS + '" aria-valuenow="' + questionNum + '"><div class="progress-fill" style="width:' + pct + '%"></div></div>';
  }

  function komorebiBg() {
    return '<div class="komorebi-bg" aria-hidden="true"><span></span><span></span><span></span></div>';
  }

  function footerHtml() {
    var f = UI.footer;
    return (
      '<footer class="foot-note" aria-label="運営者情報、著作権、ライセンス情報">' +
        '<div>' + esc(f.hospitalName) + '</div>' +
        '<div>' + esc(f.contact) + '</div>' +
        '<div>' + esc(f.copyright) + '</div>' +
        '<div class="foot-note-scope">' + esc(f.copyrightScope) + '</div>' +
        '<div class="foot-note-license">' + esc(f.qrLibraryNotice) + '</div>' +
        '<div class="foot-note-trademark">' + esc(f.qrTrademarkNotice) + '</div>' +
        '<details class="foot-license-details">' +
          '<summary>' + esc(f.licenseSummary) + '</summary>' +
          '<pre>' + esc(f.licenseText) + '</pre>' +
        '</details>' +
      '</footer>'
    );
  }

  // --- 画面：開始画面 ---

  function renderStart() {
    return (
      komorebiBg() + topbarHtml(null, null) +
      '<main class="screen" id="main-content">' +
        '<div class="start-wrap">' +
          '<img class="brand-logo-hero" src="' + LOGO_DATA_URI + '" alt="' + esc(UI.brandName) + ' ACP事前問診">' +
          '<h1 class="start-title" tabindex="-1">これからの医療やケアについて<br>今の考えを整理してみましょう</h1>' +
          '<div class="start-meta" aria-label="質問の概要">' +
            '<div class="start-meta-item"><strong>6つ</strong><span>質問数</span></div>' +
            '<div class="start-meta-item"><strong>3～5分</strong><span>所要時間の目安</span></div>' +
          '</div>' +
          '<div class="start-body">' +
            '<p>この質問は、あなたが大切にしたいことを、医療者やご家族と話し合うきっかけにするものです。</p>' +
            '<ul class="start-points">' +
              '<li>答えにくい質問は、選ばずに進めます</li>' +
              '<li>今は決められなくても構いません</li>' +
              '<li>回答だけで治療方針は決まりません</li>' +
              '<li>回答内容は保存・送信されません</li>' +
            '</ul>' +
          '</div>' +
          '<div class="start-reassure">' + esc(UI.start.reassure) + '</div>' +
        '</div>' + footerHtml() +
      '</main>' +
      '<div class="actionbar"><button class="btn btn-primary btn-block" data-action="start">' + esc(UI.start.startButton) + '</button></div>'
    );
  }

  // --- 画面：回答者区分選択 ---

  function renderRespondent() {
    var optionsHtml = RESPONDENT_OPTIONS.map(function (opt) {
      var checked = state.respondent === opt.id;
      return '<label class="option is-radio' + (checked ? ' is-checked' : '') + '"><input type="radio" name="respondent" value="' + opt.id + '"' + (checked ? ' checked' : '') + '><span class="mark" aria-hidden="true">&#10003;</span><span class="label">' + esc(opt.label) + '</span></label>';
    }).join('');
    return (
      topbarHtml(null, '回答前の確認') +
      '<main class="screen" id="main-content">' +
        '<fieldset class="q-fieldset" aria-describedby="respondent-help">' +
          '<legend class="q-title" tabindex="-1">' + esc(UI.respondent.question) + '</legend>' +
          '<p class="q-sub" id="respondent-help">' + esc(UI.respondent.sub) + '</p>' +
          '<div class="option-list" data-question="respondent">' + optionsHtml + '</div>' +
        '</fieldset>' +
      '</main>' +
      '<div class="actionbar"><button class="btn btn-secondary" data-action="back">' + (state.editingRespondent ? '確認画面へ戻る' : 'はじめに戻る') + '</button><button class="btn btn-primary" data-action="next" id="respondent-next"' + (state.respondent ? '' : ' disabled') + '>' + (state.editingRespondent ? '修正を反映して確認へ戻る' : '質問へ進む') + '</button></div>'
    );
  }

  // --- 画面：各設問 ---

  function renderQuestion(q, questionNum) {
    var selected = state.answers[q.id];
    var regularHtml = q.options.map(function (opt) {
      var checked = selected.has(opt.id);
      return '<label class="option' + (checked ? ' is-checked' : '') + '"><input type="checkbox" name="' + q.id + '" value="' + opt.id + '"' + (checked ? ' checked' : '') + '><span class="mark" aria-hidden="true">&#10003;</span><span class="label">' + esc(opt.label) + '</span></label>';
    }).join('');
    var exclusiveHtml = '';
    if (q.exclusive) {
      var exChecked = selected.has(q.exclusive.id);
      exclusiveHtml = '<div class="option-divider">どれにも当てはまらない場合</div><label class="option is-exclusive' + (exChecked ? ' is-checked' : '') + '"><input type="checkbox" name="' + q.id + '" value="' + q.exclusive.id + '" data-exclusive="1"' + (exChecked ? ' checked' : '') + '><span class="mark" aria-hidden="true">&#10003;</span><span class="label">' + esc(q.exclusive.label) + '</span></label>';
    }
    var noteHtml = q.note ? '<p class="note-inline">' + esc(q.note) + '</p>' : '';
    var isEditing = state.editingQuestion === q.id;
    var backButton = isEditing ? '<button class="btn btn-secondary" data-action="return-confirm">確認画面へ戻る</button>' : '<button class="btn btn-secondary" data-action="back">' + esc(UI.nav.back) + '</button>';
    var nextLabel = isEditing ? '修正を反映して確認へ戻る' : esc(UI.nav.next);
    return (
      topbarHtml(questionNum, null) + progressTrackHtml(questionNum) +
      '<main class="screen" id="main-content">' +
        '<fieldset class="q-fieldset" aria-describedby="' + q.id + '-help' + (q.note ? ' ' + q.id + '-note' : '') + '">' +
          '<legend class="q-title" tabindex="-1">' + esc(q.title) + '</legend>' +
          '<p class="q-sub" id="' + q.id + '-help">' + esc(q.sub) + ' 選ばずに進むこともできます。</p>' +
          (q.note ? '<p class="note-inline" id="' + q.id + '-note">' + esc(q.note) + '</p>' : '') +
          '<div class="inline-warning" id="q-warning" style="display:none" role="alert"></div>' +
          '<div class="option-list" data-question="' + q.id + '">' + regularHtml + exclusiveHtml + '</div>' +
        '</fieldset>' +
      '</main>' +
      '<div class="actionbar">' + backButton + '<button class="btn btn-primary" data-action="next">' + nextLabel + '</button></div>'
    );
  }

  // --- 画面：回答確認 ---

  function respondentLabel() {
    var found = RESPONDENT_OPTIONS.filter(function (o) { return o.id === state.respondent; })[0];
    return found ? found.label : '未設定';
  }

  function renderConfirm() {
    var count = answeredCount();
    var sectionsHtml = QUESTIONS.map(function (q) {
      var selected = orderedSelections(q);
      var itemsHtml = selected.length === 0 ? '<li class="empty">未回答</li>' : selected.map(function (opt) { return '<li>' + esc(opt.label) + '</li>'; }).join('');
      var noteHtml = q.noteTrigger && state.answers[q.id].has(q.noteTrigger) ? '<div class="summary-note">' + esc(q.noteText) + '</div>' : '';
      return '<section class="summary-section"><div class="summary-section-head"><h3>' + esc(q.section) + '</h3><button type="button" class="summary-edit" data-action="edit-question" data-question-id="' + q.id + '">' + (selected.length ? 'この項目を修正' : 'この項目に回答') + '</button></div><ul>' + itemsHtml + '</ul>' + noteHtml + '</section>';
    }).join('');
    var attentionTop = '<div>' + esc(UI.confirm.attention[0]) + '</div>';
    var attentionRest = UI.confirm.attention.slice(1).map(function (t) { return '<li>' + esc(t) + '</li>'; }).join('');
    return (
      topbarHtml(null, '回答内容の確認') +
      '<main class="screen" id="main-content">' +
        '<h1 class="q-title" tabindex="-1">' + esc(UI.confirm.title) + '</h1>' +
        '<div class="answer-count">6問中' + count + '問に回答しています' + (count < TOTAL_QUESTIONS ? '（未回答 ' + (TOTAL_QUESTIONS - count) + '問）' : '') + '</div>' +
        '<div class="attn-box">' + attentionTop + '<ul>' + attentionRest + '</ul></div>' +
        '<div class="summary-card">' +
          '<div class="summary-meta"><span>回答日：' + formatDateJa(new Date()) + '</span><span>回答者：' + esc(respondentLabel()) + ' <button type="button" class="summary-edit" data-action="edit-respondent">修正</button></span></div>' +
          sectionsHtml +
        '</div>' +
      '</main>' +
      '<div class="actionbar"><button class="btn btn-secondary" data-action="back">最後の質問へ戻る</button><button class="btn btn-primary" data-action="generate-qr">' + esc(UI.confirm.generateButton) + '</button></div>'
    );
  }

  // --- 画面：QRコード表示 ---

  function renderQrErased() {
    return '<main class="screen" id="main-content"><div class="erased-wrap"><div class="icon-circle" aria-hidden="true">&#10003;</div><h1 class="q-title" tabindex="-1">' + esc(UI.qr.erasedTitle) + '</h1><p class="lead">' + esc(UI.qr.erasedBody) + '</p><button class="btn btn-primary" data-action="reset">' + esc(UI.qr.erasedButton) + '</button></div></main>';
  }

  function renderQrActive() {
    var svg = '';
    var levels = ['M', 'L'];
    var generated = false;
    for (var i = 0; i < levels.length && !generated; i++) {
      try {
        var qr = window.qrcode(0, levels[i]);
        qr.addData(qrRecordText, 'Byte');
        qr.make();
        svg = qr.createSvgTag({ cellSize: 5, margin: 16, title: 'ACP事前問診の回答QRコード', alt: '職員が回答内容を読み取るためのQRコード' });
        generated = true;
      } catch (e) {}
    }
    if (!generated) svg = '<p role="alert">' + esc(UI.qr.failMessage) + '</p>';
    var cautionItemsHtml = UI.qr.cautionItems.map(function (t) { return '<li>' + esc(t) + '</li>'; }).join('');
    return (
      '<button class="fs-toggle" data-action="fullscreen" type="button">' + esc(UI.qr.fullscreenButton) + '</button>' +
      '<main class="screen" id="main-content">' +
        '<div class="qr-wrap">' +
          '<h1 class="q-title" tabindex="-1" style="text-align:center;">' + esc(UI.qr.title) + '</h1>' +
          '<div class="qr-card">' + svg + '</div>' +
          '<div class="qr-timer" data-role="timer" aria-hidden="true">' + esc(UI.qr.timerLabel) + '10:00</div>' +
          '<p class="visually-hidden">QRコードは10分後に自動的に消去されます。必要な場合は表示時間を延長できます。</p>' +
          '<div class="timer-warning" data-role="timer-warning" aria-live="polite"></div>' +
          '<div class="qr-guidance">' + esc(UI.qr.guidance) + '</div>' +
          '<div class="qr-controls">' +
            '<button class="btn btn-primary" data-action="extend-timer">表示時間を10分延長</button>' +
            '<button class="btn btn-secondary" data-action="reset">' + esc(UI.qr.resetButton) + '</button>' +
          '</div>' +
          '<details class="qr-alternative"><summary>QRコードが読めないとき</summary><p class="q-sub">職員にこの内容を見せてください。</p><pre>' + esc(qrRecordText) + '</pre></details>' +
          '<div class="caution-box"><h3>' + esc(UI.qr.cautionTitle) + '</h3><ul>' + cautionItemsHtml + '</ul></div>' +
        '</div>' +
      '</main>'
    );
  }

  function startEraseTimer(durationMs) {
    clearEraseTimer();
    var duration = typeof durationMs === 'number' ? durationMs : AUTO_ERASE_MS;
    eraseDeadline = Date.now() + duration;
    eraseTickId = setInterval(updateTimerDisplay, 1000);
    eraseTimerId = setTimeout(function () {
      clearEraseTimer();
      qrRecordText = '';
      state.answers = freshState().answers;
      state.respondent = null;
      state.qrErased = true;
      render();
    }, duration);
    updateTimerDisplay();
  }

  function clearEraseTimer() {
    if (eraseTimerId) { clearTimeout(eraseTimerId); eraseTimerId = null; }
    if (eraseTickId) { clearInterval(eraseTickId); eraseTickId = null; }
    eraseDeadline = null;
  }

  function extendEraseTimer() {
    if (!eraseDeadline || state.qrExtensions >= MAX_QR_EXTENSIONS) return;
    var remaining = Math.max(0, eraseDeadline - Date.now());
    state.qrExtensions += 1;
    state.timerWarned = false;
    startEraseTimer(remaining + AUTO_ERASE_MS);
    var btn = root.querySelector('[data-action="extend-timer"]');
    if (btn) {
      if (state.qrExtensions >= MAX_QR_EXTENSIONS) {
        btn.disabled = true;
        btn.textContent = '表示時間は延長済みです';
      } else {
        btn.textContent = 'さらに10分延長（あと1回）';
      }
    }
    var warning = root.querySelector('[data-role="timer-warning"]');
    if (warning) warning.textContent = '表示時間を10分延長しました。';
  }

  function updateTimerDisplay() {
    if (!eraseDeadline) return;
    var remain = Math.max(0, eraseDeadline - Date.now());
    var m = Math.floor(remain / 60000);
    var s = Math.floor((remain % 60000) / 1000);
    var el = root.querySelector('[data-role="timer"]');
    if (el) el.textContent = UI.qr.timerLabel + m + ':' + String(s).padStart(2, '0');
    if (remain <= 60000 && remain > 0 && !state.timerWarned) {
      state.timerWarned = true;
      var warning = root.querySelector('[data-role="timer-warning"]');
      if (warning) warning.textContent = 'あと1分で回答内容を自動的に消去します。必要な場合は表示時間を延長してください。';
    }
  }

  // --- メインレンダー ---

  function render() {
    var screen = currentScreen();
    clearEraseTimer();
    var html = '';
    switch (screen) {
      case 'start': html = renderStart(); break;
      case 'respondent': html = renderRespondent(); break;
      case 'confirm': html = renderConfirm(); break;
      case 'qr':
        if (state.qrErased) html = renderQrErased();
        else { qrRecordText = buildRecordText(); html = renderQrActive(); }
        break;
      default:
        var q = questionById(screen);
        html = renderQuestion(q, QUESTIONS.indexOf(q) + 1);
    }
    root.innerHTML = html;
    applyDisplayPreferences();
    attachHandlers();
    if (screen === 'qr' && !state.qrErased) startEraseTimer(AUTO_ERASE_MS);
    focusMainHeading();
  }

  function focusMainHeading() {
    var heading = root.querySelector('h1.q-title, h1.start-title, legend.q-title');
    if (heading && typeof heading.focus === 'function') {
      try { heading.focus({ preventScroll: true }); } catch (e) { heading.focus(); }
    }
  }

  // --- パネル操作 ---

  function openPanel(name, trigger) {
    var panel = root.querySelector('[data-panel="' + name + '"]');
    if (!panel) return;
    lastPanelTrigger = trigger || document.activeElement;
    panel.hidden = false;
    var focusable = panel.querySelector('button, input');
    if (focusable) focusable.focus();
  }

  function closePanel(panel) {
    if (!panel) return;
    panel.hidden = true;
    if (lastPanelTrigger && typeof lastPanelTrigger.focus === 'function') lastPanelTrigger.focus();
  }

  // --- イベント処理 ---

  function handleExclusiveLogic(container, changedInput) {
    var isExclusive = changedInput.dataset.exclusive === '1';
    var inputs = container.querySelectorAll('input[type="checkbox"]');
    if (changedInput.checked) {
      if (isExclusive) inputs.forEach(function (inp) { if (inp !== changedInput) inp.checked = false; });
      else inputs.forEach(function (inp) { if (inp.dataset.exclusive === '1') inp.checked = false; });
    }
  }

  function syncAnswersFromDom(qid, container) {
    var set = new Set();
    container.querySelectorAll('input[type="checkbox"]:checked').forEach(function (inp) { set.add(inp.value); });
    state.answers[qid] = set;
  }

  function refreshOptionVisuals(container) {
    container.querySelectorAll('.option').forEach(function (label) {
      var input = label.querySelector('input');
      label.classList.toggle('is-checked', input.checked);
    });
  }

  function attachHandlers() {
    var startBtn = root.querySelector('[data-action="start"]');
    if (startBtn) startBtn.addEventListener('click', goNext);

    var backBtn = root.querySelector('[data-action="back"]');
    if (backBtn) backBtn.addEventListener('click', function () {
      if (currentScreen() === 'respondent' && state.editingRespondent) {
        state.editingRespondent = false;
        goTo('confirm');
      } else {
        goBack();
      }
    });

    var nextBtn = root.querySelector('[data-action="next"]');
    if (nextBtn) {
      nextBtn.addEventListener('click', function () {
        if (currentScreen() === 'respondent' && state.editingRespondent) {
          state.editingRespondent = false;
          goTo('confirm');
          return;
        }
        if (currentScreen() === 'q6' && !anyAnswered()) {
          var warnEl = root.querySelector('#q-warning');
          if (warnEl) {
            warnEl.textContent = UI.validation.q6EmptyWarning;
            warnEl.style.display = 'flex';
            warnEl.focus && warnEl.focus();
            warnEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          }
          return;
        }
        if (state.editingQuestion === currentScreen()) {
          state.editingQuestion = null;
          goTo('confirm');
          return;
        }
        goNext();
      });
    }

    var returnConfirm = root.querySelector('[data-action="return-confirm"]');
    if (returnConfirm) returnConfirm.addEventListener('click', function () { state.editingQuestion = null; goTo('confirm'); });

    var respContainer = root.querySelector('[data-question="respondent"]');
    if (respContainer) {
      respContainer.addEventListener('change', function (e) {
        if (e.target.type !== 'radio') return;
        state.respondent = e.target.value;
        refreshOptionVisuals(respContainer);
        var nextBtnEl = document.getElementById('respondent-next');
        if (nextBtnEl) nextBtnEl.disabled = false;
      });
    }

    var qContainer = root.querySelector('.option-list[data-question]');
    if (qContainer && qContainer.dataset.question !== 'respondent') {
      var qid = qContainer.dataset.question;
      qContainer.addEventListener('change', function (e) {
        if (e.target.type !== 'checkbox') return;
        handleExclusiveLogic(qContainer, e.target);
        syncAnswersFromDom(qid, qContainer);
        refreshOptionVisuals(qContainer);
        var warnEl = root.querySelector('#q-warning');
        if (warnEl && anyAnswered()) warnEl.style.display = 'none';
      });
    }

    root.querySelectorAll('[data-action="edit-question"]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        state.editingRespondent = false;
        state.editingQuestion = btn.dataset.questionId;
        goTo(btn.dataset.questionId);
      });
    });

    var editRespondent = root.querySelector('[data-action="edit-respondent"]');
    if (editRespondent) editRespondent.addEventListener('click', function () { state.editingQuestion = null; state.editingRespondent = true; goTo('respondent'); });

    var genBtn = root.querySelector('[data-action="generate-qr"]');
    if (genBtn) genBtn.addEventListener('click', function () { state.qrExtensions = 0; state.timerWarned = false; goNext(); });

    var fsBtn = root.querySelector('[data-action="fullscreen"]');
    if (fsBtn) fsBtn.addEventListener('click', function () {
      if (!document.fullscreenElement) {
        if (root.requestFullscreen) root.requestFullscreen().catch(function () {});
      } else if (document.exitFullscreen) document.exitFullscreen().catch(function () {});
    });

    var extendBtn = root.querySelector('[data-action="extend-timer"]');
    if (extendBtn) extendBtn.addEventListener('click', extendEraseTimer);

    var resetBtn = root.querySelector('[data-action="reset"]');
    if (resetBtn) resetBtn.addEventListener('click', resetAll);

    var settingsBtn = root.querySelector('[data-action="open-settings"]');
    if (settingsBtn) settingsBtn.addEventListener('click', function () { openPanel('settings', settingsBtn); });
    var helpBtn = root.querySelector('[data-action="open-help"]');
    if (helpBtn) helpBtn.addEventListener('click', function () { openPanel('help', helpBtn); });

    root.querySelectorAll('[data-action="close-panel"]').forEach(function (btn) {
      btn.addEventListener('click', function () { closePanel(btn.closest('.utility-panel')); });
    });
    root.querySelectorAll('.utility-panel').forEach(function (panel) {
      panel.addEventListener('click', function (e) { if (e.target === panel) closePanel(panel); });
    });

    root.querySelectorAll('input[name="font-size"]').forEach(function (radio) {
      radio.addEventListener('change', function () { if (radio.checked) { state.display.fontSize = radio.value; applyDisplayPreferences(); } });
    });
    var contrast = root.querySelector('input[name="high-contrast"]');
    if (contrast) contrast.addEventListener('change', function () { state.display.highContrast = contrast.checked; applyDisplayPreferences(); });
    var decoration = root.querySelector('input[name="reduced-decoration"]');
    if (decoration) decoration.addEventListener('change', function () { state.display.reducedDecoration = decoration.checked; applyDisplayPreferences(); });
  }

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') {
      var open = root.querySelector('.utility-panel:not([hidden])');
      if (open) closePanel(open);
    }
  });

  render();

  window.addEventListener('pagehide', function () {
    clearEraseTimer();
    state = freshState();
    qrRecordText = '';
  });

})();
</script>
</body>
</html>
